<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تفاصيل المنتج - MR MARTIN</title>
  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px 20px;
      text-align: center;
    }

    .box {
      max-width: 700px;
      margin: auto;
      background: #111;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 30px;
    }

    img {
      width: 100%;
      max-height: 450px;
      object-fit: cover;
      border-radius: 16px;
    }

    h1 {
      margin-top: 20px;
      font-size: 36px;
    }

    .price {
      font-size: 28px;
      font-weight: bold;
      margin: 15px 0;
    }

    p {
      color: #bbb;
      line-height: 1.8;
      font-size: 18px;
    }

    a {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 24px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=1000&q=80" alt="product">
    <h1>جاكيت أسود فاخر</h1>
    <div class="price">$120</div>
    <p>
      جاكيت رجالي فاخر بتصميم أنيق وخامة ممتازة، مناسب للستايل العصري والراقي.
    </p>
    <a href="index.html">الرجوع للمتجر</a>
  </div>
</body>
</html>
