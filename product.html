<!DOCTYPE html>
<html>
<head>
  <title>Product</title>
</head>
<body style="background:black;color:white;text-align:center;padding:50px;font-family:Arial">

<h1 id="name"></h1>
<p id="price"></p>

<a href="index.html" style="background:white;color:black;padding:10px 20px;text-decoration:none;">رجوع</a>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(id == "jacket"){
  document.getElementById("name").innerText = "جاكيت أسود فاخر";
  document.getElementById("price").innerText = "$120";
}

if(id == "tshirt"){
  document.getElementById("name").innerText = "تيشيرت كلاسيك";
  document.getElementById("price").innerText = "$40";
}

if(id == "suit"){
  document.getElementById("name").innerText = "بدلة عصرية";
  document.getElementById("price").innerText = "$180";
}

if(id == "pants"){
  document.getElementById("name").innerText = "بنطلون فاخر";
  document.getElementById("price").innerText = "$65";
}
</script>

</body>
</html>
